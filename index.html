<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaker Clone - Professional Animation Editor</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/assets.css">
    <link rel="stylesheet" href="css/scenes.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Topbar Module -->
        <header id="topbar">
            <div class="logo">Animaker<span>Clone</span></div>
            <div class="project-info">
                <input type="text" id="project-name" value="Untitled Project">
            </div>
            <div class="topbar-actions">
                <button id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
                <button id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
                <button id="btn-preview" class="primary">Preview</button>
                <button id="btn-export" class="accent">Export</button>
            </div>
        </header>

        <main id="editor-container">
            <!-- Left Sidebar (Assets & Library) -->
            <aside id="left-sidebar">
                <nav class="sidebar-nav">
                    <!-- Nav items will be added in sidebar module -->
                </nav>
                <div class="sidebar-content">
                    <!-- Asset library content -->
                </div>
            </aside>

            <!-- Middle Area (Canvas) -->
            <section id="canvas-area">
                <div class="canvas-toolbar">
                    <!-- Tool buttons -->
                </div>
                <div id="viewport">
                    <!-- The actual animation canvas -->
                    <canvas id="animation-canvas"></canvas>
                </div>
            </section>

            <!-- Right Sidebar (Properties & Layers) -->
            <aside id="right-sidebar">
                <div class="panel-tabs">
                    <button class="active">Properties</button>
                    <button>Layers</button>
                </div>
                <div class="panel-content">
                    <!-- Property controls -->
                </div>
            </aside>
        </main>

        <!-- Bottom Timeline -->
        <footer id="timeline-container">
            <div class="timeline-header">
                <!-- Playback controls -->
            </div>
            <div class="timeline-body">
                <!-- Tracks and keyframes -->
            </div>
        </footer>
    </div>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
