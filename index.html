<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaker Clone - Professional Animation Editor</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/assets.css">
    <link rel="stylesheet" href="css/scenes.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Topbar Module -->
        <header id="topbar">
            <div class="topbar-left">
                <div class="logo">Animaker<span>Clone</span></div>
                <div class="divider"></div>
                <div class="project-info">
                    <input type="text" id="project-name" value="Untitled Project" placeholder="Untitled Project">
                    <span class="save-status">Saved</span>
                </div>
            </div>

            <div class="topbar-center">
                <div class="history-actions">
                    <button id="btn-undo" class="icon-btn" title="Undo (Ctrl+Z)">
                        <span class="icon">Undo</span>
                    </button>
                    <button id="btn-redo" class="icon-btn" title="Redo (Ctrl+Y)">
                        <span class="icon">Redo</span>
                    </button>
                </div>
                <div class="divider"></div>
                <div class="canvas-actions">
                    <span class="canvas-resolution">1280 x 720 (16:9)</span>
                </div>
            </div>

            <div class="topbar-right">
                <div class="topbar-actions">
                    <button id="btn-preview" class="btn-secondary" title="Preview Animation">
                        <span class="icon">▶️</span> Preview
                    </button>
                    <button id="btn-export" class="btn-primary" title="Export Video/GIF">
                        <span class="icon">📥</span> Export
                    </button>
                </div>
                <div class="divider"></div>
                <div class="user-profile">
                    <div class="avatar" title="User Profile">A</div>
                </div>
            </div>
        </header>

        <main id="editor-container">
            <!-- Left Sidebar (Assets & Library) -->
            <aside id="left-sidebar">
                <nav class="sidebar-nav">
                    <button class="nav-item active" data-tab="characters" title="Characters">
                        <span class="icon">👤</span>
                        <span class="label">Characters</span>
                    </button>
                    <button class="nav-item" data-tab="props" title="Props">
                        <span class="icon">🎁</span>
                        <span class="label">Props</span>
                    </button>
                    <button class="nav-item" data-tab="backgrounds" title="Backgrounds">
                        <span class="icon">🖼️</span>
                        <span class="label">BG</span>
                    </button>
                    <button class="nav-item" data-tab="text" title="Text">
                        <span class="icon">T</span>
                        <span class="label">Text</span>
                    </button>
                    <button class="nav-item" data-tab="audio" title="Audio">
                        <span class="icon">🎵</span>
                        <span class="label">Audio</span>
                    </button>
                </nav>
                <div class="sidebar-content">
                    <div class="search-box">
                        <input type="text" id="asset-search" placeholder="Search assets...">
                    </div>
                    <div id="asset-library">
                        <!-- Asset items will be dynamically loaded here -->
                        <div class="empty-state">
                            Select a category to view assets
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Middle Area (Canvas) -->
            <section id="canvas-area">
                <div class="canvas-toolbar">
                    <div class="toolbar-group">
                        <button id="tool-select" class="tool-btn active" title="Select Tool (V)">
                            <span class="icon">Cursor</span>
                        </button>
                        <button id="tool-hand" class="tool-btn" title="Hand Tool (H)">
                            <span class="icon">Hand</span>
                        </button>
                    </div>
                    <div class="divider"></div>
                    <div class="toolbar-group">
                        <button id="btn-grid" class="tool-btn" title="Toggle Grid (G)">
                            <span class="icon">Grid</span>
                        </button>
                    </div>
                    <div class="spacer"></div>
                    <div class="toolbar-group zoom-controls">
                        <button id="btn-zoom-out" class="tool-btn" title="Zoom Out">-</button>
                        <span id="zoom-level">100%</span>
                        <button id="btn-zoom-in" class="tool-btn" title="Zoom In">+</button>
                        <button id="btn-zoom-reset" class="tool-btn" title="Reset Zoom">Fit</button>
                    </div>
                </div>
                <div id="canvas-workspace">
                    <div id="viewport">
                        <!-- The actual animation canvas -->
                        <canvas id="animation-canvas"></canvas>
                    </div>
                </div>
            </section>

            <!-- Right Sidebar (Properties & Layers) -->
            <aside id="right-sidebar">
                <div class="panel-tabs">
                    <button class="active">Properties</button>
                    <button>Layers</button>
                </div>
                <div class="panel-content">
                    <!-- Property controls -->
                </div>
            </aside>
        </main>

        <!-- Bottom Timeline -->
        <footer id="timeline-container">
            <div class="timeline-header">
                <!-- Playback controls -->
            </div>
            <div class="timeline-body">
                <!-- Tracks and keyframes -->
            </div>
        </footer>
    </div>

    <!-- JavaScript Files -->
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
